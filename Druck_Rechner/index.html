<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rechner für Druck-/Dichtehöhe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Druck<span>rechner</span></h1>

    <div class="card">
      <div class="warning-box">
        &#9888; Nutzung auf eigene Gefahr - Nur zur Planung/Information
      </div>

      <div class="inputs">
        <div class="input-group">
          <label>QNH</label>
          <input type="number" id="qnh" placeholder="1013" />
          <span class="unit">hPa</span>
        </div>
        <div class="input-group">
          <label>Temperatur</label>
          <input type="number" id="temp" step="1" placeholder="15" />
          <span class="unit">°C</span>
        </div>
        <div class="input-group">
          <label>Platzhöhe</label>
          <input type="number" id="fe" step="1" placeholder="1000" />
          <span class="unit" id="aktEinh">ft</span>
        </div>
      </div>

      <div class="limit-row">
        <div class="input-group">
          <label>Einheit</label>
          <select id="einheit">
            <option value="ft" selected>Fuß (ft)</option>
            <option value="m">Meter (m)</option>
          </select>
        </div>
      </div>

      <div class="btn-row">
        <button id="calcBtn" onclick="onClickBtn()">Berechnen</button>
      </div>

      <div class="results">
        <div class="result-box box-head">
          <div class="tag">Druckhöhe</div>
          <div class="value" id="outPressAlt">-</div>
        </div>
        <div class="result-box box-cross">
          <div class="tag">Dichtehöhe</div>
          <div class="value" id="outDensAlt">-</div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
  <footer>
    <p style="text-align: center;"><a href="../index.html">Zurück zur Startseite</a></p>
    <span
      >(C) 2026 Josef Weiß
      <a href="mailto:weiss.josef1987@googlemail.com">Mail schreiben</a></span
    >
  </footer>
</html>
